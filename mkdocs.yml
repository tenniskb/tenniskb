site_name: Tennis Knowledge Base
site_description: Comprehensive tennis training resource - Foundation, Advanced, and Elite levels
site_author: Henry Pham
copyright: © 2026 Henry Phạm Đức · Tennis & Tai Chi research · All site content is for educational purposes.
theme:
  name: material
  custom_dir: docs/theme
  palette:
    primary: teal
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.prune
    - search.highlight
    - search.suggest
    - alternate
  language: en
  alternate:
    - name: English
      link: /
      lang: en
    - name: Tiếng Việt
      link: /vi/
      lang: vi
extra_css:
  - assets/css/style.css
  - assets/css/extra.css
  - assets/css/enhancements.css
  - assets/css/phase5.css
extra_javascript:
  - assets/js/extra.js
  - assets/js/fix-links.js  # Add this line
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - footnotes
plugins:
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
          nav_translations:
            Home: Home
            Foundation: Foundation
            Overview: Overview
            Basics: Basics
            'Deep Dives': Deep Dives
            Advanced: Advanced
            Elite: Elite
        - locale: vi
          name: Tiếng Việt
          build: true
          nav_translations:
            Home: Trang Chủ
            Foundation: Nền Tảng
            Overview: Tổng Quan
            Basics: Cơ Bản
            'Deep Dives': Chuyên Sâu
            Advanced: Cao Cấp
            Elite: Tinh Hoa
      fallback_to_default: true

nav:
  - Home: index.md
  - Foundation:
      - Overview: foundation/index.md
      - Basics: foundation/basics/index.md
      - 'Deep Dives': foundation/deep-dives/index.md
  - Advanced:
      - Overview: advanced/index.md
      - Basics: advanced/basics/index.md
      - 'Deep Dives': advanced/deep-dives/index.md
  - Elite:
      - Overview: elite/index.md
      - Basics: elite/basics/index.md
      - 'Deep Dives': elite/deep-dives/index.md
